# Install as /etc/nginx/sites-available/wgpanel and symlink into sites-enabled.
# After obtaining a certificate (e.g. `certbot --nginx -d vpn.example.com`),
# certbot rewrites this to listen on 443 with TLS.

server {
    listen 80;
    server_name vpn.example.com;   # <-- change me

    # Limit upload body; configs are tiny.
    client_max_body_size 1m;

    location /static/ {
        alias /opt/wg_control/staticfiles/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
