{% extends "base.html" %}
{% block title %}Sign in — WireGuard Panel{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card mt-5">
      <div class="card-body">
        <h1 class="h4 mb-1 text-center">🛡️ WireGuard Panel</h1>
        <p class="text-secondary text-center mb-4">Sign in to continue</p>

        {% if form.errors %}
          <div class="alert alert-danger">Invalid username or password.</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
